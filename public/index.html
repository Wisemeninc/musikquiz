<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnlyMIP MusicQuiz</title>
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <link rel="stylesheet" href="/style.css?v=4">
  <script src="/theme.js?v=3"></script>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1><a href="/" class="title-link"><img src="/logo.svg" class="logo-img"><span class="brand-text">OnlyMIP MusicQuiz</span></a></h1>
      <nav class="header-nav">
        <a href="/quizmaster" class="nav-link">Quiz Master</a>
        <select id="theme-select" class="nav-link theme-select">
          <option value="dark">OF Theme</option>
          <option value="ua">UA Theme</option>
          <option value="tpb">TPB Theme</option>
          <option value="ph">PH Theme</option>
        </select>
      </nav>
    </div>
    <p class="subtitle">Join a music quiz</p>

    <div class="card">
      <h2>Join a Quiz</h2>
      <p class="hint">Got a quiz link? Just open it directly, or paste the quiz ID below.</p>
      <form id="join-form">
        <div class="form-group">
          <label for="quiz-id">Quiz ID</label>
          <input type="text" id="quiz-id" placeholder="e.g. a1b2c3d4" required>
        </div>
        <button type="submit" class="btn btn-secondary">Go to Quiz</button>
      </form>
    </div>
  </div>

  <footer class="footer">
    <a href="https://github.com/Wisemeninc/musikquiz" target="_blank" rel="noopener">GitHub</a>
  </footer>

  <script>
    // Join quiz
    document.getElementById('join-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const quizId = document.getElementById('quiz-id').value.trim();
      if (quizId) {
        window.location.href = `/quiz/${quizId}`;
      }
    });
  </script>
</body>
</html>
