<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 512" width="100%" height="100%">
  <!-- Pure black background -->
  <rect x="0" y="0" width="1536" height="512" rx="64" fill="#000000"/>

  <!-- MIP text in white, very large -->
  <text x="80" y="345" font-family="Impact, 'Arial Black', Helvetica, sans-serif"
        font-weight="900" font-size="280" fill="#ffffff" letter-spacing="4">MIP</text>

  <!-- Orange pill badge for HUB -->
  <rect x="720" y="120" width="720" height="280" rx="56" fill="#ff9000"/>

  <!-- HUB text in black on orange pill -->
  <text x="1080" y="345" font-family="Impact, 'Arial Black', Helvetica, sans-serif"
        font-weight="900" font-size="280" fill="#000000" text-anchor="middle" letter-spacing="4">HUB</text>

  <!-- Tagline at the bottom, centered -->
  <text x="768" y="465" font-family="system-ui, -apple-system, sans-serif"
        font-weight="700" font-size="50" fill="#ff9000" text-anchor="middle" letter-spacing="14">
    MUSIC QUIZ
  </text>
</svg>
