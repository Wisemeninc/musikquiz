<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 512" width="100%" height="100%">
  <!-- Top half: Ukrainian blue -->
  <path d="M 64 0 L 1472 0 Q 1536 0 1536 64 L 1536 256 L 0 256 L 0 64 Q 0 0 64 0 Z" fill="#0057B7"/>

  <!-- Bottom half: Ukrainian yellow -->
  <path d="M 0 256 L 1536 256 L 1536 448 Q 1536 512 1472 512 L 64 512 Q 0 512 0 448 Z" fill="#FFD700"/>

  <!-- Sunflower centered on the flag split, on the left -->
  <g transform="translate(256, 256)">
    <!-- Outer petals -->
    <g fill="#FFD700" stroke="#0057B7" stroke-width="3">
      <ellipse cx="0" cy="-110" rx="28" ry="65"/>
      <ellipse cx="0" cy="-110" rx="28" ry="65" transform="rotate(45)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="65" transform="rotate(90)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="65" transform="rotate(135)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="65" transform="rotate(180)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="65" transform="rotate(225)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="65" transform="rotate(270)"/>
      <ellipse cx="0" cy="-110" rx="28" ry="65" transform="rotate(315)"/>
    </g>
    <!-- Inner petals -->
    <g fill="#FFD700" stroke="#0057B7" stroke-width="2" opacity="0.9">
      <ellipse cx="0" cy="-100" rx="18" ry="55" transform="rotate(22.5)"/>
      <ellipse cx="0" cy="-100" rx="18" ry="55" transform="rotate(67.5)"/>
      <ellipse cx="0" cy="-100" rx="18" ry="55" transform="rotate(112.5)"/>
      <ellipse cx="0" cy="-100" rx="18" ry="55" transform="rotate(157.5)"/>
      <ellipse cx="0" cy="-100" rx="18" ry="55" transform="rotate(202.5)"/>
      <ellipse cx="0" cy="-100" rx="18" ry="55" transform="rotate(247.5)"/>
      <ellipse cx="0" cy="-100" rx="18" ry="55" transform="rotate(292.5)"/>
      <ellipse cx="0" cy="-100" rx="18" ry="55" transform="rotate(337.5)"/>
    </g>
    <!-- Dark seed center -->
    <circle cx="0" cy="0" r="52" fill="#3a2810"/>
    <circle cx="0" cy="0" r="52" fill="none" stroke="#0057B7" stroke-width="3"/>
    <!-- M letter in center -->
    <path d="M -28 20 L -28 -20 L -10 5 L 0 -13 L 10 5 L 28 -20 L 28 20"
          fill="none" stroke="#FFD700" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Slava MIP text on the right, vertically centered -->
  <text x="528" y="320" font-family="Impact, 'Arial Black', sans-serif"
        font-size="180" fill="#ffffff" stroke="#0057B7" stroke-width="10"
        paint-order="stroke fill"
        letter-spacing="8">
    SLAVA MIP
  </text>
</svg>
