<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="1em" height="1em" style="vertical-align: middle; margin-right: 8px;">
  <defs>
    <linearGradient id="uaGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0057B7"/>
      <stop offset="100%" style="stop-color:#FFD700"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer ring (OF-style) -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#uaGrad)" stroke-width="16" opacity="0.3"/>

  <!-- O letter -->
  <path d="M 168 256 A 88 88 0 1 1 168 256.1"
        fill="none"
        stroke="url(#uaGrad)"
        stroke-width="36"
        stroke-linecap="round"
        filter="url(#glow)"
        transform="translate(-30, 0)"/>

  <!-- M letter -->
  <path d="M 240 340 L 240 172 L 296 260 L 352 172 L 352 340"
        fill="none"
        stroke="url(#uaGrad)"
        stroke-width="36"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#glow)"
        transform="translate(10, 0)"/>
</svg>
