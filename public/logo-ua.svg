<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Top half: Ukrainian blue -->
  <path d="M 64 0 L 448 0 Q 512 0 512 64 L 512 256 L 0 256 L 0 64 Q 0 0 64 0 Z" fill="#0057B7"/>

  <!-- Bottom half: Ukrainian yellow -->
  <path d="M 0 256 L 512 256 L 512 448 Q 512 512 448 512 L 64 512 Q 0 512 0 448 Z" fill="#FFD700"/>

  <!-- Sunflower (Ukraine's national flower) centered on the flag split -->
  <g transform="translate(256, 256)">
    <!-- Petals -->
    <g fill="#FFD700" stroke="#0057B7" stroke-width="3">
      <ellipse cx="0" cy="-80" rx="22" ry="50"/>
      <ellipse cx="0" cy="-80" rx="22" ry="50" transform="rotate(45)"/>
      <ellipse cx="0" cy="-80" rx="22" ry="50" transform="rotate(90)"/>
      <ellipse cx="0" cy="-80" rx="22" ry="50" transform="rotate(135)"/>
      <ellipse cx="0" cy="-80" rx="22" ry="50" transform="rotate(180)"/>
      <ellipse cx="0" cy="-80" rx="22" ry="50" transform="rotate(225)"/>
      <ellipse cx="0" cy="-80" rx="22" ry="50" transform="rotate(270)"/>
      <ellipse cx="0" cy="-80" rx="22" ry="50" transform="rotate(315)"/>
    </g>
    <!-- Smaller petals between -->
    <g fill="#FFD700" stroke="#0057B7" stroke-width="2" opacity="0.9">
      <ellipse cx="0" cy="-75" rx="14" ry="42" transform="rotate(22.5)"/>
      <ellipse cx="0" cy="-75" rx="14" ry="42" transform="rotate(67.5)"/>
      <ellipse cx="0" cy="-75" rx="14" ry="42" transform="rotate(112.5)"/>
      <ellipse cx="0" cy="-75" rx="14" ry="42" transform="rotate(157.5)"/>
      <ellipse cx="0" cy="-75" rx="14" ry="42" transform="rotate(202.5)"/>
      <ellipse cx="0" cy="-75" rx="14" ry="42" transform="rotate(247.5)"/>
      <ellipse cx="0" cy="-75" rx="14" ry="42" transform="rotate(292.5)"/>
      <ellipse cx="0" cy="-75" rx="14" ry="42" transform="rotate(337.5)"/>
    </g>
    <!-- Dark seed center -->
    <circle cx="0" cy="0" r="40" fill="#3a2810"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#0057B7" stroke-width="3"/>
    <!-- M letter in center -->
    <path d="M -22 16 L -22 -16 L -8 4 L 0 -10 L 8 4 L 22 -16 L 22 16"
          fill="none" stroke="#FFD700" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Slava MIP text on yellow band - white with blue outline for max contrast -->
  <text x="256" y="445" font-family="Impact, 'Arial Black', sans-serif"
        font-size="64" fill="#ffffff" stroke="#0057B7" stroke-width="6"
        paint-order="stroke fill"
        text-anchor="middle" letter-spacing="3">
    SLAVA MIP
  </text>
</svg>
