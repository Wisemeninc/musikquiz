<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1536 512" width="100%" height="100%">
  <!-- OnlyFans signature cyan badge -->
  <rect x="0" y="0" width="1536" height="512" rx="88" fill="#00AFF0"/>

  <!-- OnlyFans-style ring mark: white open ring + center dot -->
  <g transform="translate(250, 256)">
    <circle cx="0" cy="0" r="138" fill="none" stroke="#ffffff" stroke-width="40"/>
    <circle cx="0" cy="0" r="42" fill="#ffffff"/>
  </g>

  <!-- OnlyMIP wordmark, Only + heavier MIP -->
  <text x="470" y="330" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="232" fill="#ffffff" letter-spacing="-8">Only<tspan font-weight="900">MIP</tspan></text>
</svg>
