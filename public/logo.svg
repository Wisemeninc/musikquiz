<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- OnlyFans signature cyan-blue background -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="#00AFF0"/>

  <!-- White circle ring (iconic O / lock shape) -->
  <circle cx="256" cy="200" r="115" fill="none" stroke="#ffffff" stroke-width="26"/>

  <!-- Music note inside the ring (replacing the lock) -->
  <g transform="translate(256, 200)">
    <!-- Note stem -->
    <rect x="20" y="-60" width="10" height="78" fill="#ffffff"/>
    <!-- Note flag -->
    <path d="M 30 -60 Q 70 -50, 70 -10 Q 60 -30, 30 -32 Z" fill="#ffffff"/>
    <!-- Note head -->
    <ellipse cx="0" cy="22" rx="26" ry="18" fill="#ffffff" transform="rotate(-20)"/>
  </g>

  <!-- OnlyMIP wordmark - matching OnlyFans typography style -->
  <text x="256" y="430" font-family="system-ui, -apple-system, 'Helvetica Neue', sans-serif"
        font-weight="700" font-size="76" fill="#ffffff" text-anchor="middle" letter-spacing="-2">
    Only<tspan font-weight="900">MIP</tspan>
  </text>
</svg>
